services:
  - type: web
    name: jobrover-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobrover-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: jobrover-tracker-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: jobrover-tracker-api
          type: web
          property: host

databases:
  - name: jobrover-tracker-db
    databaseName: jobrover_tracker
    user: postgres
    plan: free