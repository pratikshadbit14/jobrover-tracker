# version: "3.9"

services:
  p1-db:
    image: postgres:16
    container_name: jobrover_p1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobrover_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - p1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  p1-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrover_p1_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    depends_on:
      p1-db:
        condition: service_healthy
    volumes:
      - ./backend:/app     # live reload in dev

volumes:
  p1_data: